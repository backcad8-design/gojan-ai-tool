<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고잔고등학교 AI와 탐구하기</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { font-family: "Pretendard", sans-serif; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }); // 렌더링될 때마다 아이콘 확인
            return <i data-lucide={name} className={className} style={{display: 'inline-block'}}></i>;
        };

        const TRACKS = [
            {
                id: 'academic',
                title: '학술형',
                icon: 'book-open',
                description: '데이터로 세상을 읽고 비판적으로 분석하여 사회 문제를 해결할 나만의 대안을 찾습니다.',
                prompts: [
                    { id: 1, title: '문제 찾기', text: (theme) => `내가 분석하고 싶은 사회 현상은 [${theme}]이야. 이 현상이 얼마나 심각한지 보여주는 통계 자료 3가지를 추천해주고, 각각의 숫자가 우리 사회에 어떤 의미를 주는지 설명해 줘.` },
                    { id: 2, title: '나의 생각 검증', text: (theme) => `나는 [지표 A]가 늘어나면 [지표 B]도 함께 변한다고 생각해. 내 생각이 맞는지 최근 통계 자료와 사회 과학 이론을 바탕으로 확인해 줄래?` },
                    { id: 3, title: '비판적으로 보기', text: (theme) => `방금 분석한 결과가 내 편견일 수도 있을까? 내 생각과 반대되는 사례나, 내가 놓치고 있는 다른 원인이 있다면 알려줘.` },
                    { id: 4, title: '이유 탐구', text: (theme) => `이런 사회 현상이 생기는 진짜 이유를 사람의 마음(심리)이나 사회 시스템의 문제점에서 찾아 분석해 줘.` },
                    { id: 5, title: '미래 예측', text: (theme) => `지금처럼 상황이 계속된다면, 10년 뒤에는 어떤 문제가 더 커질까? 구체적인 숫자를 들어서 미래 모습을 그려줘.` },
                    { id: 6, title: '정책 고치기', text: (theme) => `지금 정부에서 하는 해결책들이 효과가 작다는 의견이 있어. 실패한 사례를 하나 분석해주고, 사람들의 행동을 자연스럽게 바꾸는 '넛지(Nudge)' 아이디어를 활용해서 더 좋은 방법을 제안해 줘.` },
                    { id: 7, title: '부작용 고민', text: (theme) => `네가 제안한 방법을 실제로 쓸 때 생길 수 있는 도덕적인 문제나 사람들 사이의 갈등은 없을까? 그걸 해결할 방법도 알려줘.` },
                    { id: 8, title: '다른 나라 사례', text: (theme) => `비슷한 문제를 겪었던 다른 나라(유럽, 일본 등)는 어떻게 해결했어? 우리나라에 바로 적용할 수 있는 좋은 사례를 하나 골라줘.` },
                    { id: 9, title: '내가 할 일', text: (theme) => `고등학생인 내가 이 문제를 주변에 알리거나 해결하기 위해 학교에서 직접 해볼 수 있는 활동은 뭐가 있을까?` },
                    { id: 10, title: '보고서 완성', text: (theme) => `오늘 대화한 내용을 바탕으로 '주제-통계 근거-원인 분석-해결책'이 포함된 탐구 보고서 초안을 작성해 줘.` },
                ]
            },
            {
                id: 'career',
                title: '진로형',
                icon: 'target',
                description: '관심 있는 전공의 심화 이론을 탐구하고, 고등학교 활동과 대학교 전공을 논리적으로 연결합니다.',
                prompts: [
                    { id: 1, title: '공부의 연결', text: (major) => `나는 [${major}] 전문가를 꿈꾸고 있어. 고등학교 [교과목명]에서 배운 [핵심 개념]이 대학교 전공 수업에서는 얼마나 더 깊게 쓰이는지 알려줘.` },
                    { id: 2, title: '어려운 이론 도전', text: (major) => `대학교 전공에서 다루는 어려운 이론 중 하나를 골라줘. 고등학교 지식과 비교해서 설명해주고, 이게 왜 중요한지도 알려줘.` },
                    { id: 3, title: '최신 연구', text: (major) => `이 이론과 관련해서 요즘 학자들이 관심을 가지는 주제는 뭐야? 고등학생인 내가 궁금해할 만한 질문을 2가지 던져줘.` },
                    { id: 4, title: '실제 쓰임새', text: (major) => `이 전공 지식이 실제 산업 현장(AI, 바이오, 에너지 등 회사)에서 어떻게 돈을 벌거나 세상을 바꾸고 있어?` },
                    { id: 5, title: '필요한 능력', text: (major) => `이 분야에서 일하는 전문가들에게 가장 필요한 '비판적 생각'과 '문제 해결 능력'은 구체적으로 어떤 상황에서 발휘돼?` },
                    { id: 6, title: '나의 경험 연결', text: (major) => `내가 학교에서 했던 [활동명: 예-화학 실험/수학 발표] 과정이 이 전공에서 요구하는 능력과 어떻게 닮아 있는지 논리적으로 연결해 줘.` },
                    { id: 7, title: '미래의 모습', text: (major) => `10년 뒤, 기술이 더 발전했을 때 이 전공 분야에서 사람이 꼭 해야 할 일과 지켜야 할 도덕적 기준은 무엇일까?` },
                    { id: 8, title: '창의적 융합', text: (major) => `나의 희망 전공과 [전혀 다른 분야: 예-음악, 건축 등]을 합쳐서 새로운 가치를 만들 수 있는 탐구 주제를 추천해 줘.` },
                    { id: 9, title: '공부 계획', text: (major) => `전공에 필요한 실력을 더 키우기 위해, 남은 고등학교 기간 동안 내가 공부해야 할 심화 주제와 읽으면 좋은 책 3권 추천해 줘.` },
                    { id: 10, title: '에세이 완성', text: (major) => `오늘 탐구한 내용을 바탕으로 '전공 탐색 에세이(꿈을 갖게 된 동기-깊이 있는 공부-나의 능력-미래의 모습)'를 작성해 줘.` },
                ]
            },
            {
                id: 'reflection',
                title: '성찰형',
                icon: 'refresh-cw',
                description: '메타인지를 활용해 나의 학습 습관을 진단하고, 과학적인 근거를 바탕으로 나만의 성장 전략을 수립합니다.',
                prompts: [
                    { id: 1, title: '나의 습관 점검', text: (habit) => `나는 공부할 때 [${habit}] 같은 습관이 있어. 이걸 심리학에서는 뭐라고 부르는지, 왜 이런 일이 생기는지 알려줘.` },
                    { id: 2, title: '성적 분석', text: (habit) => `지난 모의고사 취약 과목에서 자꾸 틀리는 이유가 뭘까? 내 생각의 과정 중 어디에서 실수가 생기는지 진단해 줘.` },
                    { id: 3, title: '효율적 공부법', text: (habit) => `내가 아는 것과 모르는 것을 정확히 구별하는 '메타인지'를 높이기 위해, 배운 내용을 다시 떠올리는 '인출 연습'을 어떻게 하면 좋을까?` },
                    { id: 4, title: '집중력 기르기', text: (habit) => `집중력이 떨어지는 이유를 뇌과학적으로 설명해주고, 딴생각 없이 공부에 깊이 빠져들 수 있는 환경을 만드는 방법을 알려줘.` },
                    { id: 5, title: '마음 다스리기', text: (habit) => `공부가 잘 안되어 힘들 때, 이걸 '포기'가 아니라 '더 커지기 위한 단계'로 생각하려면 어떤 마음가짐이 필요할까?` },
                    { id: 6, title: '황금 시간표', text: (habit) => `내 하루 일과를 분석해서, 뇌가 가장 쌩쌩할 때 어려운 공부를 할 수 있는 시간표를 짜줘.` },
                    { id: 7, title: '공부의 이유', text: (habit) => `성적을 위해서가 아니라, 배우는 즐거움을 느끼기 위해서 내가 공부하는 과목들이 내 삶에 어떤 가치를 주는지 알려줘.` },
                    { id: 8, title: '단계별 계획', text: (habit) => `남은 기간을 3단계로 나눠서, 각 단계마다 내가 집중해야 할 공부 전략과 마음가짐을 정리해 줘.` },
                    { id: 9, title: '객관적 관찰', text: (habit) => `오늘 대화를 통해 본 나의 공부 장점과 단점은 뭐야? 네가 나를 지켜본 친구라고 생각하고 솔직하게 말해줘.` },
                    { id: 10, title: '전략서 완성', text: (habit) => `오늘의 대화를 바탕으로 나만의 자기주도 학습전략서'를 완성해줘.` },
                ]
            }
        ];

        function App() {
            const [step, setStep] = useState(0); 
            const [selectedTrack, setSelectedTrack] = useState(null);
            const [userName, setUserName] = useState('');
            const [grade, setGrade] = useState('');
            const [studentId, setStudentId] = useState(''); 
            const [interest, setInterest] = useState('');
            const [currentPromptIdx, setCurrentPromptIdx] = useState(-1); 
            const [copySuccess, setCopySuccess] = useState(null);
            const [completedSteps, setCompletedSteps] = useState([]);
            const [customQuestion, setCustomQuestion] = useState('');
            const scrollRef = useRef(null);

            useEffect(() => {
                setCustomQuestion('');
                if (scrollRef.current) { scrollRef.current.scrollTop = 0; }
            }, [step, currentPromptIdx]);

            const copyToClipboard = (text) => {
                if (!text || !text.trim()) return;
                navigator.clipboard.writeText(text).then(() => {
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(null), 2000);
                });
            };

            const getPersonaPrompt = () => `안녕! 나는 오늘 너와 함께 ${selectedTrack?.title || '학습'} 프로젝트를 진행할 고등학교 ${grade || 'N'}학년 학생 ${userName || '무명'}이야. 나는 평소 ${interest || '학업'}에 대해 호기심이 아주 많아. 오늘 나는 단순히 정답을 얻는 게 아니라, 너와 깊이 있게 대화하며 나만의 생각을 정리하고 싶어. 준비됐니?`;
            const getFinalPrompt = () => `방금 대화를 바탕으로 학교생활기록부 '개별 세부능력 및 특기사항'에 들어갈 초안을 작성해 줘. \n포함할 내용: (1) 이 활동을 시작한 이유 (2) AI와 대화하면서 AI의 답변을 그대로 믿지 않고 내가 직접 고민하고 수정한 과정 (3) 활동 후 내가 얼마나 성장했는지.\n길이: 공백 포함 300자 정도.\n규칙: '매우 잘함', '열심히 함' 같은 칭찬보다는 내가 어떤 행동을 했고 어떤 생각을 했는지 구체적으로 써줘. 말투는 '~함', '~임'으로 끝내줘. 고등학교 수준의 내용으로 풀어서 작성.`;

            const handleNextStep = () => {
                if (selectedTrack && currentPromptIdx < selectedTrack.prompts.length - 1) {
                    if (!completedSteps.includes(currentPromptIdx)) { setCompletedSteps([...completedSteps, currentPromptIdx]); }
                    setCurrentPromptIdx(prev => prev + 1);
                } else { setStep(5); }
            };

            const handlePrevStep = () => {
                if (currentPromptIdx > -1) { setCurrentPromptIdx(prev => prev - 1); }
                else { setStep(3); }
            };

            const isRequiredStep = currentPromptIdx === -1 || (selectedTrack?.id !== 'career' && currentPromptIdx === 0) || currentPromptIdx === 9;

            return (
                <div className="min-h-screen flex flex-col overflow-hidden bg-slate-50">
                    <header className="h-20 bg-white border-b flex items-center justify-between px-10 sticky top-0 z-50">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setStep(0)} className="p-3 hover:bg-slate-100 rounded-2xl text-slate-400 hover:text-indigo-600"><Icon name="home" className="w-6 h-6" /></button>
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg"><Icon name="layout" className="w-6 h-6 text-white" /></div>
                                <span className="font-black text-2xl tracking-tighter text-slate-900 underline decoration-indigo-500 decoration-4 underline-offset-4">고잔고 AI 탐구 도구</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="text-right">
                                <p className="text-[10px] font-bold text-slate-400 leading-none uppercase">Student</p>
                                <p className="text-sm font-bold text-slate-700">{userName ? `${userName} (${studentId})` : 'Guest'}</p>
                            </div>
                            <div className="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center border-2 border-white shadow-sm overflow-hidden"><Icon name="user" className="w-5 h-5 text-slate-400" /></div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden relative flex flex-col">
                        {step === 0 && (
                            <div className="flex-1 flex flex-col items-center justify-center text-center p-12 space-y-12 bg-white">
                                <div className="p-6 bg-indigo-600 rounded-[2.5rem] shadow-2xl animate-pulse"><Icon name="sparkles" className="w-16 h-16 text-white" /></div>
                                <div className="space-y-4">
                                    <h1 className="text-6xl font-black text-slate-900 tracking-tight leading-tight italic uppercase">AI와 탐구하기</h1>
                                    <p className="text-xl text-slate-400 max-w-3xl mx-auto font-medium">Gemini와 함께하는 깊이 있는 대화를 통해<br />당신의 학술적 호기심과 진로 역량을 문장으로 완성하세요.</p>
                                </div>
                                <button onClick={() => setStep(1)} className="px-16 py-6 bg-indigo-600 text-white rounded-3xl font-black text-2xl hover:bg-indigo-700 transition-all shadow-2xl shadow-indigo-200">성장 로드맵 시작하기</button>
                            </div>
                        )}
                        
                        {step === 1 && (
                            <div className="flex-1 flex flex-col items-center justify-center p-8 space-y-10 bg-slate-50 text-center">
                                <div className="w-24 h-24 bg-indigo-100 rounded-3xl flex items-center justify-center mx-auto mb-6"><Icon name="log-in" className="w-12 h-12 text-indigo-600" /></div>
                                <h2 className="text-5xl font-black text-slate-900">제미나이를 열고<br />로그인 해주세요.</h2>
                                <div className="flex gap-6 w-full max-w-xl">
                                    <a href="https://gemini.google.com" target="_blank" className="flex-1 py-6 bg-white border-2 border-slate-900 text-slate-900 rounded-[1.5rem] font-black text-xl flex items-center justify-center gap-3">제미나이 열기 <Icon name="external-link" className="w-6 h-6" /></a>
                                    <button onClick={() => setStep(2)} className="flex-1 py-6 bg-indigo-600 text-white rounded-[1.5rem] font-black text-xl">준비 완료</button>
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="flex-1 flex flex-col items-center justify-center p-8 space-y-12">
                                <h2 className="text-5xl font-black text-slate-900">어떤 방향으로 탐구해볼까요?</h2>
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 w-full max-w-7xl px-4">
                                    {TRACKS.map(track => (
                                        <button key={track.id} onClick={() => { setSelectedTrack(track); setStep(3); }} className="group flex flex-col p-10 bg-white border-2 border-slate-100 rounded-[3rem] text-left hover:border-indigo-500 hover:shadow-2xl transition-all relative overflow-hidden">
                                            <div className="p-6 bg-indigo-50 text-indigo-600 rounded-3xl group-hover:bg-indigo-600 group-hover:text-white transition-all mb-8 w-fit"><Icon name={track.icon} className="w-8 h-8" /></div>
                                            <h3 className="text-3xl font-black text-slate-900 mb-4">{track.title}</h3>
                                            <p className="text-lg text-slate-500 leading-relaxed">{track.description}</p>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 3 && (
                            <div className="flex-1 flex flex-col items-center justify-center p-8 max-w-xl mx-auto space-y-10 w-full">
                                <h2 className="text-4xl font-extrabold text-slate-900">페르소나 설정</h2>
                                <div className="w-full space-y-8 bg-white p-10 rounded-[2.5rem] border border-slate-200 shadow-xl">
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="text" value={userName} onChange={(e) => setUserName(e.target.value)} className="w-full p-5 border-2 rounded-2xl outline-none" placeholder="이름" />
                                        <input type="text" value={studentId} onChange={(e) => setStudentId(e.target.value)} className="w-full p-5 border-2 rounded-2xl outline-none" placeholder="학번" />
                                    </div>
                                    <input type="number" value={grade} onChange={(e) => setGrade(e.target.value)} className="w-full p-5 border-2 rounded-2xl outline-none" placeholder="학년" />
                                    <textarea value={interest} onChange={(e) => setInterest(e.target.value)} className="w-full p-5 border-2 rounded-2xl outline-none h-32 resize-none" placeholder="관심 주제 또는 공부 습관" />
                                    <button disabled={!userName || !grade || !interest || !studentId} onClick={() => setStep(4)} className="w-full p-5 bg-indigo-600 text-white rounded-2xl font-bold text-xl disabled:opacity-30">가이드 생성 완료</button>
                                </div>
                            </div>
                        )}

                        {step === 4 && selectedTrack && (
                            <div className="flex-1 flex bg-slate-50 overflow-hidden">
                                <aside className="w-80 border-r bg-white flex flex-col shrink-0 shadow-sm text-left">
                                    <div className="p-8 border-b">
                                        <div className="flex items-center gap-3 text-indigo-600 font-black mb-1"><Icon name={selectedTrack.icon} className="w-5 h-5" /> <span className="uppercase">{selectedTrack.title}</span></div>
                                        <div className="h-2 w-full bg-slate-100 rounded-full mt-6"><div className="h-full bg-indigo-600 transition-all duration-700" style={{ width: `${((currentPromptIdx + 2) / (selectedTrack.prompts.length + 1)) * 100}%` }} /></div>
                                    </div>
                                    <nav className="flex-1 overflow-y-auto p-4 space-y-1">
                                        <button onClick={() => setCurrentPromptIdx(-1)} className={`w-full text-left flex items-center gap-4 p-4 rounded-2xl text-sm ${currentPromptIdx === -1 ? 'bg-indigo-50 text-indigo-700 font-bold' : 'text-slate-400'}`}>페르소나 설정</button>
                                        {selectedTrack.prompts.map((p, i) => (
                                            <button key={p.id} onClick={() => setCurrentPromptIdx(i)} className={`w-full text-left flex items-center gap-4 p-4 rounded-2xl text-sm ${i === currentPromptIdx ? 'bg-indigo-50 text-indigo-700 font-bold' : 'text-slate-400'}`}>{p.title}</button>
                                        ))}
                                    </nav>
                                </aside>
                                <section ref={scrollRef} className="flex-1 flex flex-col p-12 overflow-y-auto items-center">
                                    <div className="max-w-3xl w-full space-y-10 text-left">
                                        <h2 className="text-5xl font-black text-slate-900 leading-tight">{currentPromptIdx === -1 ? "필수: 페르소나 설정" : `${selectedTrack.prompts[currentPromptIdx].title}`}</h2>
                                        <div className="bg-white border-2 border-slate-100 rounded-[3.5rem] p-12 shadow-2xl space-y-10">
                                            <div className="p-10 bg-slate-50 rounded-[2.5rem] text-2xl text-slate-700 leading-relaxed font-semibold italic">"{currentPromptIdx === -1 ? getPersonaPrompt() : selectedTrack.prompts[currentPromptIdx].text(interest)}"</div>
                                            {!isRequiredStep && <textarea value={customQuestion} onChange={(e) => setCustomQuestion(e.target.value)} className="w-full p-6 bg-indigo-50/30 border-2 border-indigo-100 rounded-[2rem] text-xl outline-none" placeholder="나만의 질문으로 수정해보세요." />}
                                            <div className="flex gap-4">
                                                <button onClick={handlePrevStep} className="flex-1 py-6 bg-slate-100 text-slate-500 rounded-[1.5rem] font-black text-xl">이전</button>
                                                <button onClick={() => copyToClipboard(isRequiredStep ? (currentPromptIdx === -1 ? getPersonaPrompt() : selectedTrack.prompts[currentPromptIdx].text(interest)) : customQuestion)} className="flex-[1.5] py-6 border-2 border-indigo-600 text-indigo-600 rounded-[1.5rem] font-black text-xl"><Icon name="clipboard" className="w-6 h-6 inline mr-2" /> 복사</button>
                                                <button onClick={handleNextStep} className="flex-[1.5] py-6 bg-indigo-600 text-white rounded-[1.5rem] font-black text-xl">다음</button>
                                            </div>
                                        </div>
                                    </div>
                                </section>
                            </div>
                        )}

                        {step === 5 && (
                            <div className="flex-1 flex flex-col items-center justify-center p-8 max-w-4xl mx-auto space-y-12 text-center">
                                <h2 className="text-5xl font-black text-slate-900">생기부 문장 만들기</h2>
                                <div className="w-full bg-white border-2 border-indigo-600 rounded-[3rem] p-12 shadow-2xl text-left">
                                    <div className="text-slate-800 leading-[1.8] text-2xl font-bold p-10 bg-slate-50 rounded-[2rem] italic">"{getFinalPrompt()}"</div>
                                    <button onClick={() => copyToClipboard(getFinalPrompt())} className="w-full mt-8 py-6 bg-indigo-600 text-white rounded-2xl font-black text-xl">프롬프트 전체 복사하기</button>
                                </div>
                                <button onClick={() => setStep(6)} className="px-10 py-5 bg-indigo-600 text-white rounded-2xl font-black">다음 안내 보기</button>
                            </div>
                        )}

                        {step === 6 && (
                            <div className="flex-1 flex flex-col items-center justify-center p-8 max-w-5xl mx-auto space-y-12 text-center">
                                <h2 className="text-5xl font-black text-slate-900">탐구 완료! 결과 제출하기</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full text-left">
                                    <div className="bg-white border-2 border-indigo-100 p-10 rounded-[3rem] shadow-xl">
                                        <h3 className="text-indigo-600 font-black text-xl mb-4">1. 탐구 보고서 제출</h3>
                                        <p className="text-slate-700">10번째 답변을 한글 파일에 저장 후 리로스쿨에 업로드하세요.</p>
                                    </div>
                                    <div className="bg-white border-2 border-green-100 p-10 rounded-[3rem] shadow-xl">
                                        <h3 className="text-green-600 font-black text-xl mb-4">2. 생기부 문장 제출</h3>
                                        <p className="text-slate-700">마지막 답변을 복사하여 리로스쿨 과제함에 직접 붙여넣으세요.</p>
                                    </div>
                                </div>
                                <button onClick={() => setStep(0)} className="text-slate-400 font-black underline">처음으로 돌아가기</button>
                            </div>
                        )}
                    </main>

                    {copySuccess && (
                        <div className="fixed bottom-12 right-12 bg-slate-900 text-white px-10 py-6 rounded-[2rem] shadow-2xl z-[100] animate-bounce">
                            복사되었습니다! 제미나이에 붙여넣으세요.
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
