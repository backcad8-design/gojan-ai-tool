<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고잔고등학교 AI와 탐구하기</title>
    <!-- 외부 라이브러리 CDN 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body { 
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            color: #0f172a;
            overflow: hidden; /* 전체 페이지 스크롤 방지하여 한 화면에 고정 */
            -webkit-font-smoothing: antialiased;
        }
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 페이드인 애니메이션 */
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Lucide 아이콘 래퍼 (React Reconciliation 오류 방지) ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const wrapperRef = useRef(null);
            useEffect(() => {
                if (window.lucide && wrapperRef.current) {
                    wrapperRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: wrapperRef.current,
                        attrs: { class: className }
                    });
                }
            }, [name, className]);
            return <span ref={wrapperRef} className="inline-flex items-center justify-center align-middle"></span>;
        };

        // --- 탐구 트랙 데이터 데이터 ---
        const TRACKS = [
            {
                id: 'academic',
                title: '학술형',
                icon: 'book-open',
                description: '데이터와 통계로 세상을 분석하고 사회 문제를 해결할 나만의 대안을 찾습니다.',
                prompts: [
                    { id: 1, title: '문제 찾기', text: (theme) => `내가 분석하고 싶은 사회 현상은 [${theme}]이야. 이 현상이 얼마나 심각한지 보여주는 통계 자료 3가지를 추천해주고, 각각의 숫자가 우리 사회에 어떤 의미를 주는지 설명해 줘.` },
                    { id: 2, title: '나의 생각 검증', text: (theme) => `나는 [지표 A]가 늘어나면 [지표 B]도 함께 변한다고 생각해. 내 생각이 맞는지 최근 통계 자료와 사회 과학 이론을 바탕으로 확인해 줄래?` },
                    { id: 3, title: '비판적으로 보기', text: (theme) => `방금 분석한 결과가 내 편견일 수도 있을까? 내 생각과 반대되는 사례나, 내가 놓치고 있는 다른 원인이 있다면 알려줘.` },
                    { id: 4, title: '이유 탐구', text: (theme) => `이런 사회 현상이 생기는 진짜 이유를 사람의 마음(심리)이나 사회 시스템의 문제점에서 찾아 분석해 줘.` },
                    { id: 5, title: '미래 예측', text: (theme) => `지금처럼 상황이 계속된다면, 10년 뒤에는 어떤 문제가 더 커질까? 구체적인 숫자를 들어서 미래 모습을 그려줘.` },
                    { id: 6, title: '정책 고치기', text: (theme) => `지금 정부에서 하는 해결책들이 효과가 작다는 의견이 있어. 실패한 사례를 하나 분석해주고, 사람들의 행동을 자연스럽게 바꾸는 '넛지(Nudge)' 아이디어를 활용해서 더 좋은 방법을 제안해 줘.` },
                    { id: 7, title: '부작용 고민', text: (theme) => `네가 제안한 방법을 실제로 쓸 때 생길 수 있는 도덕적인 문제나 사람들 사이의 갈등은 없을까? 그걸 해결할 방법도 알려줘.` },
                    { id: 8, title: '다른 나라 사례', text: (theme) => `비슷한 문제를 겪었던 다른 나라(유럽, 일본 등)는 어떻게 해결했어? 우리나라에 바로 적용할 수 있는 좋은 사례를 하나 골라줘.` },
                    { id: 9, title: '내가 할 일', text: (theme) => `고등학생인 내가 이 문제를 주변에 알리거나 해결하기 위해 학교에서 직접 해볼 수 있는 활동은 뭐가 있을까?` },
                    { id: 10, title: '보고서 완성', text: (theme) => `오늘 대화한 내용을 바탕으로 '주제-통계 근거-원인 분석-해결책'이 포함된 탐구 보고서 초안을 작성해 줘.` },
                ]
            },
            {
                id: 'career',
                title: '진로형',
                icon: 'target',
                description: '관심 전공의 심화 이론을 탐구하고 고등학교 교과 활동을 대학교 전공과 연결합니다.',
                prompts: [
                    { id: 1, title: '공부의 연결', text: (major) => `나는 [${major}] 전문가를 꿈꾸고 있어. 고등학교 [교과목명]에서 배운 [핵심 개념]이 대학교 전공 수업에서는 얼마나 더 깊게 쓰이는지 알려줘.` },
                    { id: 2, title: '어려운 이론 도전', text: (major) => `대학교 전공에서 다루는 어려운 이론 중 하나를 골라줘. 고등학교 지식과 비교해서 설명해주고, 이게 왜 중요한지도 알려줘.` },
                    { id: 3, title: '최신 연구', text: (major) => `이 이론과 관련해서 요즘 학자들이 관심을 가지는 주제는 뭐야? 고등학생인 내가 궁금해할 만한 질문을 2가지 던져줘.` },
                    { id: 4, title: '실제 쓰임새', text: (major) => `이 전공 지식이 실제 산업 현장(AI, 바이오, 에너지 등 회사)에서 어떻게 돈을 벌거나 세상을 바꾸고 있어?` },
                    { id: 5, title: '필요한 능력', text: (major) => `이 분야에서 일하는 전문가들에게 가장 필요한 '비판적 생각'과 '문제 해결 능력'은 구체적으로 어떤 상황에서 발휘돼?` },
                    { id: 6, title: '나의 경험 연결', text: (major) => `내가 학교에서 했던 [활동명: 예-화학 실험/수학 발표] 과정이 이 전공에서 요구하는 능력과 어떻게 닮아 있는지 논리적으로 연결해 줘.` },
                    { id: 7, title: '미래의 모습', text: (major) => `10년 뒤, 기술이 더 발전했을 때 이 전공 분야에서 사람이 꼭 해야 할 일과 지켜야 할 도덕적 기준은 무엇일까?` },
                    { id: 8, title: '창의적 융합', text: (major) => `나의 희망 전공과 [전혀 다른 분야: 예-음악, 건축 등]을 합쳐서 새로운 가치를 만들 수 있는 탐구 주제를 추천해 줘.` },
                    { id: 9, title: '공부 계획', text: (major) => `전공에 필요한 실력을 더 키우기 위해, 남은 고등학교 기간 동안 내가 공부해야 할 심화 주제와 읽으면 좋은 책 3권 추천해 줘.` },
                    { id: 10, title: '에세이 완성', text: (major) => `오늘 탐구한 내용을 바탕으로 '전공 탐색 에세이(꿈을 갖게 된 동기-깊이 있는 공부-나의 능력-미래의 모습)'를 작성해 줘.` },
                ]
            },
            {
                id: 'reflection',
                title: '성찰형',
                icon: 'refresh-cw',
                description: '과학적 근거를 바탕으로 나의 학습 습관을 진단하고 나만의 성장 전략을 수립합니다.',
                prompts: [
                    { id: 1, title: '나의 습관 점검', text: (habit) => `나는 공부할 때 [${habit}] 같은 습관이 있어. 이걸 심리학에서는 뭐라고 부르는지, 왜 이런 일이 생기는지 알려줘.` },
                    { id: 2, title: '성적 분석', text: (habit) => `지난 모의고사 취약 과목에서 자꾸 틀리는 이유가 뭘까? 내 생각의 과정 중 어디에서 실수가 생기는지 진단해 줘.` },
                    { id: 3, title: '효율적 공부법', text: (habit) => `내가 아는 것과 모르는 것을 정확히 구별하는 '메타인지'를 높이기 위해, 배운 내용을 다시 떠올리는 '인출 연습'을 어떻게 하면 좋을까?` },
                    { id: 4, title: '집중력 기르기', text: (habit) => `집중력이 떨어지는 이유를 뇌과학적으로 설명해주고, 딴생각 없이 공부에 깊이 빠져들 수 있는 환경을 만드는 방법을 알려줘.` },
                    { id: 5, title: '마음 다스리기', text: (habit) => `공부가 잘 안되어 힘들 때, 이걸 '포기'가 아니라 '더 커지기 위한 단계'로 생각하려면 어떤 마음가짐이 필요할까?` },
                    { id: 6, title: '황금 시간표', text: (habit) => `내 하루 일과를 분석해서, 뇌가 가장 쌩쌩할 때 어려운 공부를 할 수 있는 시간표를 짜줘.` },
                    { id: 7, title: '공부의 이유', text: (habit) => `성적을 위해서가 아니라, 배우는 즐거움을 느끼기 위해서 내가 공부하는 과목들이 내 삶에 어떤 가치를 주는지 알려줘.` },
                    { id: 8, title: '단계별 계획', text: (habit) => `남은 기간을 3단계로 나눠서, 각 단계마다 내가 집중해야 할 공부 전략과 마음가짐을 정리해 줘.` },
                    { id: 9, title: '객관적 관찰', text: (habit) => `오늘 대화를 통해 본 나의 공부 장점과 단점은 뭐야? 네가 나를 지켜본 친구라고 생각하고 솔직하게 말해줘.` },
                    { id: 10, title: '전략서 완성', text: (habit) => `오늘의 대화를 바탕으로 나만의 자기주도 학습전략서'를 완성해줘.` },
                ]
            }
        ];

        function App() {
            const [step, setStep] = useState(0); 
            const [selectedTrack, setSelectedTrack] = useState(null);
            const [userName, setUserName] = useState('');
            const [grade, setGrade] = useState('');
            const [studentId, setStudentId] = useState(''); 
            const [interest, setInterest] = useState('');
            const [currentPromptIdx, setCurrentPromptIdx] = useState(-1); 
            const [copySuccess, setCopySuccess] = useState(null);
            const [completedSteps, setCompletedSteps] = useState([]);
            const [customQuestion, setCustomQuestion] = useState('');
            const scrollRef = useRef(null);

            // 복사 기능
            const copyToClipboard = (text) => {
                if (!text || !text.trim()) return;
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                setCopySuccess(true);
                setTimeout(() => setCopySuccess(null), 2000);
            };

            // 프롬프트 생성 로직
            const getPersonaPrompt = () => {
                return `안녕! 나는 오늘 너와 함께 ${selectedTrack?.title || '학습'} 프로젝트를 진행할 고등학교 ${grade || 'N'}학년 학생 ${userName || '무명'}이야. 나는 평소 ${interest || '학업'}에 대해 호기심이 아주 많아. 오늘 나는 단순히 정답을 얻는 게 아니라, 너와 깊이 있게 대화하며 나만의 생각을 정리하고 싶어. 준비됐니?`;
            };

            const getFinalPrompt = () => {
                return `방금 대화를 바탕으로 학교생활기록부 '개별 세부능력 및 특기사항'에 들어갈 초안을 작성해 줘. 포함할 내용: (1) 이 활동을 시작한 이유 (2) AI와 대화하면서 AI의 답변을 그대로 믿지 않고 내가 직접 고민하고 수정한 과정 (3) 활동 후 내가 얼마나 성장했는지. 말투는 '~함', '~임'으로 끝내줘. 고등학교 수준의 내용으로 풀어서 작성.`;
            };

            // 내비게이션 핸들러
            const handleNextStep = () => {
                if (selectedTrack && currentPromptIdx < selectedTrack.prompts.length - 1) {
                    if (!completedSteps.includes(currentPromptIdx)) {
                        setCompletedSteps(prev => [...prev, currentPromptIdx]);
                    }
                    setCurrentPromptIdx(prev => prev + 1);
                    setCustomQuestion('');
                } else {
                    setStep(5);
                }
            };

            const handlePrevStep = () => {
                if (currentPromptIdx > -1) {
                    setCurrentPromptIdx(prev => prev - 1);
                    setCustomQuestion('');
                } else {
                    setStep(3);
                }
            };

            const handleRestart = () => {
                setStep(0);
                setSelectedTrack(null);
                setUserName('');
                setGrade('');
                setStudentId('');
                setInterest('');
                setCurrentPromptIdx(-1);
                setCompletedSteps([]);
                setCustomQuestion('');
            };

            // 필수 질문 판단
            const isRequiredStep = 
                currentPromptIdx === -1 || 
                (selectedTrack?.id !== 'career' && currentPromptIdx === 0) || 
                (selectedTrack && currentPromptIdx === selectedTrack.prompts.length - 1);

            return (
                <div className="h-screen w-full flex flex-col bg-slate-50 overflow-hidden text-slate-900">
                    {/* Header */}
                    <header className="h-16 bg-white border-b-2 border-slate-200 flex items-center justify-between px-6 shrink-0 z-50 shadow-sm">
                        <div className="flex items-center gap-4">
                            <button onClick={handleRestart} className="p-2 bg-slate-50 hover:bg-indigo-600 hover:text-white border border-slate-200 rounded-xl transition-all" title="처음으로">
                                <Icon name="home" className="w-5 h-5" />
                            </button>
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-indigo-700 rounded-lg flex items-center justify-center shadow-sm">
                                    <Icon name="layout" className="w-5 h-5 text-white" />
                                </div>
                                <span className="font-black text-lg tracking-tighter text-slate-800 uppercase leading-none">고잔고 AI 탐구 대시보드</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            {step > 0 && step < 6 && (
                                <div className="hidden lg:flex items-center gap-3 font-black text-[10px] uppercase tracking-widest text-slate-400">
                                    <span className={step >= 1 ? 'text-indigo-700' : ''}>Login</span>
                                    <Icon name="chevron-right" className="w-3 h-3" />
                                    <span className={step >= 2 ? 'text-indigo-700' : ''}>Track</span>
                                    <Icon name="chevron-right" className="w-3 h-3" />
                                    <span className={step >= 3 ? 'text-indigo-700' : ''}>Persona</span>
                                    <Icon name="chevron-right" className="w-3 h-3" />
                                    <span className={step >= 4 ? 'text-indigo-700' : ''}>Guide</span>
                                    <Icon name="chevron-right" className="w-3 h-3" />
                                    <span className={step >= 6 ? 'text-indigo-700' : ''}>Submit</span>
                                </div>
                            )}
                            <div className="h-8 w-px bg-slate-200 mx-1" />
                            <div className="flex items-center gap-3">
                                <div className="text-right">
                                    <p className="text-[9px] font-black text-slate-400 leading-none uppercase">Student</p>
                                    <p className="text-sm font-black text-slate-800">{userName ? `${userName} (${studentId || '학번'})` : 'Guest'}</p>
                                </div>
                                <div className="w-10 h-10 bg-indigo-50 rounded-full flex items-center justify-center border-2 border-white shadow-sm text-indigo-700">
                                    <Icon name="user" className="w-6 h-6" />
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-hidden relative">
                        {/* STEP 0: Intro */}
                        {step === 0 && (
                            <div className="h-full flex flex-col items-center justify-center text-center p-6 space-y-6 bg-white animate-fade-in overflow-y-auto">
                                <div className="p-4 bg-indigo-700 rounded-3xl shadow-lg shadow-indigo-100">
                                    <Icon name="sparkles" className="w-12 h-12 text-white" />
                                </div>
                                <div className="space-y-2">
                                    <h1 className="text-5xl font-black text-slate-900 tracking-tight leading-tight uppercase italic">고잔고등학교 AI와 탐구하기</h1>
                                    <p className="text-xl text-slate-500 font-bold max-w-2xl mx-auto leading-relaxed">
                                        Gemini와 함께하는 깊이 있는 대화를 통해<br />나만의 학술적 잠재력을 문장으로 완성하세요.
                                    </p>
                                </div>
                                <div className="bg-slate-50 border-2 border-slate-200 p-8 rounded-[2.5rem] max-w-2xl text-left space-y-4 shadow-sm font-bold">
                                    <h4 className="text-xl font-black flex items-center gap-3 text-slate-800 uppercase tracking-tight">
                                        <Icon name="info" className="w-6 h-6 text-indigo-700" /> 이용 방법 안내
                                    </h4>
                                    <ol className="text-lg space-y-3 text-slate-700 list-decimal list-inside leading-snug">

                                    <a href="https://gojan.riroschool.kr" target="_blank" rel="noreferrer" className="px-20 py-8 bg-slate-900 text-white rounded-[2.5rem] font-black text-4xl hover:bg-black transition-all shadow-xl flex items-center gap-6 active:scale-95">리로스쿨 바로가기 <Icon name="external-link" className="w-10 h-10" /></a>
                                    <button onClick={handleRestart} className="text-2xl text-slate-400 hover:text-indigo-800 transition-all font-black uppercase tracking-widest underline decoration-4 underline-offset-8 flex items-center gap-6"><Icon name="refresh-cw" className="w-8 h-8" /> 처음으로 돌아가기</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Copy Notification Toast */}
                    {copySuccess && (
                        <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-950 text-white px-12 py-6 rounded-[3rem] shadow-2xl flex items-center gap-8 animate-fade-in z-[100] border-2 border-slate-700 ring-8 ring-indigo-500/20">
                            <div className="w-14 h-14 bg-indigo-600 rounded-full flex items-center justify-center shadow-lg"><Icon name="check" className="w-10 h-10 text-white" /></div>
                            <div className="text-left space-y-1">
                                <p className="font-black text-3xl leading-none tracking-tight">복사 성공!</p>
                                <p className="text-xl text-slate-400 font-bold tracking-tight">제미나이 대화창에 붙여넣으세요 (Ctrl+V)</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
