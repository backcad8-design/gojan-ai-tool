<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고잔고등학교 AI와 탐구하기</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body {
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        }
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .shadow-premium {
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05), 0 8px 10px -6px rgb(0 0 0 / 0.05);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Lucide 아이콘 래퍼 ---
        const Icon = ({ name, className = "w-5 h-5" }) => {
            const wrapperRef = useRef(null);
            useEffect(() => {
                if (window.lucide && wrapperRef.current) {
                    wrapperRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: wrapperRef.current,
                        attrs: { class: className, 'stroke-width': 2.5 }
                    });
                }
            }, [name, className]);
            return <span ref={wrapperRef} className="inline-flex items-center justify-center"></span>;
        };

        const TRACKS = [
            {
                id: 'academic',
                title: '학술형',
                icon: 'book-open',
                description: '데이터와 통계로 세상을 분석하고 사회 문제를 해결할 나만의 대안을 찾습니다.',
                prompts: [
                    { id: 1, title: '문제 찾기', text: (theme) => `내가 분석하고 싶은 사회 현상은 [${theme}]이야. 이 현상이 얼마나 심각한지 보여주는 통계 자료 3가지를 추천해주고, 각각의 숫자가 우리 사회에 어떤 의미를 주는지 설명해 줘.` },
                    { id: 2, title: '나의 생각 검증', text: (theme) => `나는 [지표 A]가 늘어나면 [지표 B]도 함께 변한다고 생각해. 내 생각이 맞는지 최근 통계 자료와 사회 과학 이론을 바탕으로 확인해 줄래?` },
                    { id: 10, title: '보고서 완성', text: (theme) => `오늘 대화한 내용을 바탕으로 '주제-통계 근거-원인 분석-해결책'이 포함된 탐구 보고서 초안을 작성해 줘.` },
                ]
            },
            {
                id: 'career',
                title: '진로형',
                icon: 'target',
                description: '관심 전공의 심화 이론을 탐구하고 고등학교 교과 활동을 대학교 전공과 연결합니다.',
                prompts: [
                    { id: 1, title: '공부의 연결', text: (major) => `나는 [${major}] 전문가를 꿈꾸고 있어. 고등학교 교과목에서 배운 핵심 개념이 대학교 전공 수업에서는 얼마나 더 깊게 쓰이는지 알려줘.` },
                    { id: 10, title: '에세이 완성', text: (major) => `오늘 탐구한 내용을 바탕으로 '전공 탐색 에세이(꿈을 갖게 된 동기-깊이 있는 공부-나의 능력-미래의 모습)'를 작성해 줘.` },
                ]
            },
            {
                id: 'reflection',
                title: '성찰형',
                icon: 'refresh-cw',
                description: '과학적 근거를 바탕으로 나의 학습 습관을 진단하고 나만의 성장 전략을 수립합니다.',
                prompts: [
                    { id: 1, title: '나의 습관 점검', text: (habit) => `나는 공부할 때 [${habit}] 같은 습관이 있어. 이걸 심리학에서는 뭐라고 부르는지, 왜 이런 일이 생기는지 알려줘.` },
                    { id: 10, title: '전략서 완성', text: (habit) => `오늘의 대화를 바탕으로 '나만의 자기주도 학습전략서'를 완성해줘.` },
                ]
            }
        ];

        function App() {
            const [step, setStep] = useState(0);
            const [selectedTrack, setSelectedTrack] = useState(null);
            const [userName, setUserName] = useState('');
            const [grade, setGrade] = useState('');
            const [studentId, setStudentId] = useState('');
            const [interest, setInterest] = useState('');
            const [currentPromptIdx, setCurrentPromptIdx] = useState(-1);
            const [copySuccess, setCopySuccess] = useState(null);
            const [customQuestion, setCustomQuestion] = useState('');

            const copyToClipboard = (text) => {
                if (!text || !text.trim()) return;
                navigator.clipboard.writeText(text).then(() => {
                    setCopySuccess(true);
                    setTimeout(() => setCopySuccess(null), 2000);
                });
            };

            const getPersonaPrompt = () => {
                return `안녕! 나는 오늘 너와 함께 ${selectedTrack?.title || '학습'} 프로젝트를 진행할 고등학교 ${grade || 'N'}학년 학생 ${userName || '무명'}이야. 나는 평소 ${interest || '학업'}에 대해 호기심이 아주 많아. 오늘 나는 단순히 정답을 얻는 게 아니라, 너와 깊이 있게 대화하며 나만의 생각을 정리하고 싶어. 준비됐니?`;
            };

            const getFinalPrompt = () => {
                return `방금 대화를 바탕으로 학교생활기록부 '개별 세부능력 및 특기사항'에 들어갈 초안을 작성해 줘. 포함할 내용: (1) 이 활동을 시작한 이유 (2) AI와 대화하면서 AI의 답변을 그대로 믿지 않고 내가 직접 고민하고 수정한 과정 (3) 활동 후 내가 얼마나 성장했는지. 말투는 '~함', '~임'으로 끝내줘. 고등학교 수준의 내용으로 작성.`;
            };

            return (
                <div className="min-h-screen w-full flex flex-col bg-slate-50 font-medium">
                    {/* Header */}
                    <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 sm:px-6 shrink-0 z-40 sticky top-0">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setStep(0)} className="p-2 hover:bg-slate-100 rounded-lg transition-colors">
                                <Icon name="home" className="w-5 h-5 text-slate-600" />
                            </button>
                            <span className="font-black text-lg tracking-tight text-indigo-700 uppercase">Gojan AI Lab</span>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="text-right hidden sm:block">
                                <p className="text-[10px] font-bold text-slate-400 uppercase">Student</p>
                                <p className="text-sm font-black text-slate-800">{userName || 'Guest'}</p>
                            </div>
                            <div className="w-9 h-9 bg-indigo-600 rounded-full flex items-center justify-center text-white shadow-sm">
                                <Icon name="user" className="w-5 h-5" />
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 flex flex-col items-center justify-center p-4">
                        {/* STEP 0: Intro */}
                        {step === 0 && (
                            <div className="max-w-3xl w-full text-center space-y-8 animate-fade-in py-10">
                                <div className="inline-block p-4 bg-indigo-600 rounded-3xl shadow-xl mb-4">
                                    <Icon name="sparkles" className="w-12 h-12 text-white" />
                                </div>
                                <h1 className="text-4xl sm:text-6xl font-black text-slate-900 tracking-tighter">AI와 함께하는<br/>심화 탐구 프로젝트</h1>
                                <p className="text-lg sm:text-xl text-slate-500 font-bold">당신의 학술적 잠재력을 AI와 함께 문장으로 완성하세요.</p>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-left max-w-2xl mx-auto pt-6">
                                    <div className="p-6 bg-white rounded-2xl border border-slate-200 shadow-sm">
                                        <h3 className="font-black text-indigo-700 mb-2 flex items-center gap-2"><Icon name="check-circle" className="w-4 h-4"/> 논리적 질문</h3>
                                        <p className="text-sm text-slate-600 leading-relaxed">준비된 프롬프트를 통해 AI와 수준 높은 대화를 나눕니다.</p>
                                    </div>
                                    <div className="p-6 bg-white rounded-2xl border border-slate-200 shadow-sm">
                                        <h3 className="font-black text-green-700 mb-2 flex items-center gap-2"><Icon name="pen-tool" className="w-4 h-4"/> 생기부 자동화</h3>
                                        <p className="text-sm text-slate-600 leading-relaxed">대화 내용을 바탕으로 나만의 성장 기록 초안을 생성합니다.</p>
                                    </div>
                                </div>
                                <button onClick={() => setStep(1)} className="mt-8 px-10 py-4 bg-indigo-600 text-white rounded-2xl font-black text-xl hover:bg-indigo-700 transition-all hover:scale-105 active:scale-95 shadow-lg">시작하기</button>
                            </div>
                        )}

                        {/* STEP 1: Login Check */}
                        {step === 1 && (
                            <div className="max-w-md w-full bg-white p-8 rounded-[2.5rem] shadow-premium border border-slate-100 text-center space-y-6 animate-fade-in">
                                <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-slate-100">
                                    <Icon name="external-link" className="w-8 h-8 text-indigo-600" />
                                </div>
                                <h2 className="text-2xl font-black text-slate-900 leading-tight">먼저 제미나이에<br/>로그인 해주세요</h2>
                                <p className="text-slate-500 font-bold">탐구 활동을 위해 외부 브라우저 창에서 Gemini 사이트 로그인이 필요합니다.</p>
                                <div className="space-y-3 pt-4">
                                    <a href="https://gemini.google.com" target="_blank" className="block w-full py-4 bg-slate-900 text-white rounded-xl font-black hover:bg-black transition-colors">Gemini 바로가기</a>
                                    <button onClick={() => setStep(2)} className="block w-full py-4 bg-indigo-600 text-white rounded-xl font-black hover:bg-indigo-700 transition-colors">로그인 완료</button>
                                </div>
                            </div>
                        )}

                        {/* STEP 2: Track Select */}
                        {step === 2 && (
                            <div className="max-w-5xl w-full space-y-8 animate-fade-in">
                                <div className="text-center">
                                    <h2 className="text-3xl font-black text-slate-900 uppercase tracking-tight">탐구 트랙 선택</h2>
                                    <p className="text-slate-500 font-bold mt-2">나의 관심 분야에 가장 가까운 경로를 선택하세요.</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {TRACKS.map(track => (
                                        <button key={track.id} onClick={() => { setSelectedTrack(track); setStep(3); }} 
                                            className="group p-8 bg-white border-2 border-slate-200 rounded-[2rem] text-left hover:border-indigo-600 hover:shadow-xl transition-all active:scale-95">
                                            <div className="w-14 h-14 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                                                <Icon name={track.icon} className="w-8 h-8" />
                                            </div>
                                            <h3 className="text-xl font-black mb-2 text-slate-900">{track.title} 트랙</h3>
                                            <p className="text-sm text-slate-500 leading-relaxed font-bold">{track.description}</p>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* STEP 3: Setup */}
                        {step === 3 && (
                            <div className="max-w-xl w-full bg-white p-10 rounded-[2.5rem] shadow-premium border border-slate-100 animate-fade-in">
                                <h2 className="text-2xl font-black mb-8 text-slate-900 flex items-center gap-3">
                                    <Icon name="settings" className="w-6 h-6 text-indigo-600" /> 페르소나 설정
                                </h2>
                                <div className="space-y-5">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[11px] font-black text-slate-400 uppercase mb-2 ml-1">이름</label>
                                            <input type="text" value={userName} onChange={(e) => setUserName(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-600 focus:bg-white transition-all font-bold" placeholder="홍길동" />
                                        </div>
                                        <div>
                                            <label className="block text-[11px] font-black text-slate-400 uppercase mb-2 ml-1">학번</label>
                                            <input type="text" value={studentId} onChange={(e) => setStudentId(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-600 focus:bg-white transition-all font-bold" placeholder="30101" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-black text-slate-400 uppercase mb-2 ml-1">학년</label>
                                        <input type="number" value={grade} onChange={(e) => setGrade(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-600 focus:bg-white transition-all font-bold" placeholder="3" />
                                    </div>
                                    <div>
                                        <label className="block text-[11px] font-black text-slate-400 uppercase mb-2 ml-1">탐구 주제 (키워드)</label>
                                        <textarea value={interest} onChange={(e) => setInterest(e.target.value)} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-600 focus:bg-white transition-all h-28 resize-none font-bold" placeholder="예: 인공지능 윤리, 양자역학, 신재생 에너지 등" />
                                    </div>
                                    <div className="flex gap-3 pt-4">
                                        <button onClick={() => setStep(2)} className="flex-1 py-4 font-black text-slate-400 hover:text-slate-900 transition-colors">뒤로</button>
                                        <button disabled={!userName || !grade || !interest || !studentId} onClick={() => setStep(4)} className="flex-[2] py-4 bg-indigo-600 text-white rounded-xl font-black hover:bg-indigo-700 disabled:opacity-30 shadow-lg">가이드 생성</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* STEP 4: Main Guide (Prompt Loop) */}
                        {step === 4 && selectedTrack && (
                            <div className="max-w-4xl w-full grid grid-cols-1 lg:grid-cols-4 gap-8 animate-fade-in items-start">
                                {/* Sidebar Navigation */}
                                <div className="lg:col-span-1 bg-white p-4 rounded-3xl border border-slate-200 shadow-sm space-y-2 sticky top-20">
                                    <div className="p-4 mb-4 bg-indigo-50 rounded-2xl">
                                        <h4 className="font-black text-indigo-700 text-sm truncate">{selectedTrack.title} 트랙</h4>
                                        <div className="w-full bg-slate-200 h-1.5 rounded-full mt-2 overflow-hidden">
                                            <div className="bg-indigo-600 h-full transition-all" style={{ width: `${((currentPromptIdx + 2) / (selectedTrack.prompts.length + 1)) * 100}%` }}></div>
                                        </div>
                                    </div>
                                    <button onClick={() => setCurrentPromptIdx(-1)} className={`w-full p-3 rounded-xl text-left text-sm font-black transition-all ${currentPromptIdx === -1 ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:bg-slate-50'}`}>P. 페르소나 설정</button>
                                    {selectedTrack.prompts.map((p, i) => (
                                        <button key={p.id} onClick={() => { setCurrentPromptIdx(i); setCustomQuestion(''); }} 
                                            className={`w-full p-3 rounded-xl text-left text-sm font-black transition-all ${currentPromptIdx === i ? 'bg-indigo-600 text-white shadow-md' : i < currentPromptIdx ? 'text-indigo-700 bg-indigo-50' : 'text-slate-400 hover:bg-slate-50'}`}>
                                            {i + 1}. {p.title}
                                        </button>
                                    ))}
                                </div>

                                {/* Content Area */}
                                <div className="lg:col-span-3 space-y-6">
                                    <div className="bg-white p-8 sm:p-10 rounded-[3rem] border border-slate-200 shadow-premium relative overflow-hidden">
                                        <div className="flex items-center gap-3 text-indigo-600 font-black text-xs uppercase tracking-widest mb-4">
                                            <Icon name="terminal" className="w-4 h-4" /> 
                                            {currentPromptIdx === -1 ? 'STEP 0' : `STEP ${currentPromptIdx + 1}`}
                                        </div>
                                        <h2 className="text-3xl font-black text-slate-900 mb-6 leading-tight">
                                            {currentPromptIdx === -1 ? '나를 AI에게 소개하기' : selectedTrack.prompts[currentPromptIdx].title}
                                        </h2>
                                        
                                        <div className="p-6 bg-slate-50 rounded-2xl border-2 border-slate-100 text-lg font-bold text-slate-700 italic mb-8 relative group">
                                            <div className="absolute top-4 right-4 opacity-0 group-hover:opacity-100 transition-opacity">
                                                <Icon name="quote" className="w-8 h-8 text-slate-200" />
                                            </div>
                                            "{currentPromptIdx === -1 ? getPersonaPrompt() : selectedTrack.prompts[currentPromptIdx].text(interest)}"
                                        </div>

                                        {currentPromptIdx !== -1 && (
                                            <div className="space-y-4 mb-8">
                                                <label className="flex items-center gap-2 font-black text-slate-900 text-sm">
                                                    <Icon name="edit-3" className="w-4 h-4 text-indigo-600" /> 나만의 질문으로 다듬기 (선택)
                                                </label>
                                                <textarea value={customQuestion} onChange={(e) => setCustomQuestion(e.target.value)} className="w-full p-5 bg-white border-2 border-indigo-50 rounded-2xl outline-none focus:border-indigo-600 transition-all h-32 font-bold shadow-inner" placeholder="AI의 이전 답변에 대해 더 궁금한 점을 적어보세요." />
                                            </div>
                                        )}

                                        <div className="flex flex-wrap gap-4 pt-4">
                                            <button onClick={() => copyToClipboard(customQuestion || (currentPromptIdx === -1 ? getPersonaPrompt() : selectedTrack.prompts[currentPromptIdx].text(interest)))} 
                                                className="flex-1 py-4 bg-white border-2 border-indigo-600 text-indigo-600 rounded-xl font-black flex items-center justify-center gap-3 hover:bg-indigo-600 hover:text-white transition-all shadow-sm">
                                                <Icon name="copy" className="w-5 h-5" /> 프롬프트 복사
                                            </button>
                                            <button onClick={() => {
                                                if(currentPromptIdx < selectedTrack.prompts.length - 1) {
                                                    setCurrentPromptIdx(prev => prev + 1);
                                                    setCustomQuestion('');
                                                } else {
                                                    setStep(5);
                                                }
                                            }} className="flex-1 py-4 bg-indigo-600 text-white rounded-xl font-black flex items-center justify-center gap-3 hover:bg-indigo-700 transition-all shadow-lg">
                                                {currentPromptIdx === selectedTrack.prompts.length - 1 ? '최종 결과물 만들기' : '다음 미션'} <Icon name="arrow-right" className="w-5 h-5" />
                                            </button>
                                        </div>
                                    </div>
                                    <div className="flex justify-center">
                                        <a href="https://gemini.google.com" target="_blank" className="flex items-center gap-2 text-slate-400 hover:text-indigo-600 font-black text-sm transition-colors uppercase tracking-widest">
                                            Gemini 창으로 이동 <Icon name="external-link" className="w-4 h-4" />
                                        </a>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* STEP 5: Final Magic */}
                        {step === 5 && (
                            <div className="max-w-2xl w-full text-center space-y-8 animate-fade-in">
                                <div className="inline-block p-4 bg-yellow-400 rounded-full shadow-lg animate-pulse">
                                    <Icon name="wand-2" className="w-10 h-10 text-white" />
                                </div>
                                <h2 className="text-4xl font-black text-slate-900 leading-tight">축하합니다!<br/>탐구 기록을 완성할 차례입니다.</h2>
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-premium border-2 border-indigo-600 text-left space-y-6">
                                    <p className="font-bold text-slate-600 leading-relaxed">아래 마법의 프롬프트를 복사하여 Gemini에게 마지막으로 입력하세요. 여러분의 대화 내용이 훌륭한 생활기록부 문장으로 변신합니다.</p>
                                    <div className="p-6 bg-slate-50 rounded-2xl font-bold text-slate-800 text-lg border border-slate-100 shadow-inner italic">
                                        "{getFinalPrompt()}"
                                    </div>
                                    <button onClick={() => copyToClipboard(getFinalPrompt())} className="w-full py-5 bg-indigo-600 text-white rounded-xl font-black text-xl hover:bg-indigo-700 shadow-xl flex items-center justify-center gap-3">
                                        최종 프롬프트 복사 <Icon name="sparkles" className="w-6 h-6" />
                                    </button>
                                </div>
                                <button onClick={() => setStep(6)} className="text-slate-400 hover:text-slate-900 font-black underline underline-offset-4">제출 방법 확인하기</button>
                            </div>
                        )}

                        {/* STEP 6: Submission Guide */}
                        {step === 6 && (
                            <div className="max-w-4xl w-full space-y-10 animate-fade-in text-center py-10">
                                <h2 className="text-4xl font-black text-slate-900 tracking-tighter uppercase">Mission Complete!</h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 text-left">
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-premium border border-indigo-100 flex flex-col h-full">
                                        <div className="text-indigo-600 mb-6"><Icon name="file-text" className="w-12 h-12" /></div>
                                        <h3 className="text-xl font-black mb-4">1. 탐구 보고서 제출</h3>
                                        <ul className="space-y-3 text-slate-600 font-bold flex-1">
                                            <li>• Gemini의 10번째 답변(보고서) 복사</li>
                                            <li>• 한글(HWP) 파일에 붙여넣기</li>
                                            <li>• 파일명: <span className="text-indigo-700">탐구보고서_{studentId}{userName}</span></li>
                                        </ul>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-premium border border-green-100 flex flex-col h-full">
                                        <div className="text-green-600 mb-6"><Icon name="send" className="w-12 h-12" /></div>
                                        <h3 className="text-xl font-black mb-4">2. 생기부 문장 제출</h3>
                                        <ul className="space-y-3 text-slate-600 font-bold flex-1">
                                            <li>• Gemini의 마지막 답변(세특 초안) 복사</li>
                                            <li>• 리로스쿨 '자율적 교육과정' 과제함 접속</li>
                                            <li>• 텍스트 상자에 <span className="text-green-700">직접 붙여넣기</span></li>
                                        </ul>
                                    </div>
                                </div>
                                <div className="space-y-6">
                                    <a href="https://gojan.riroschool.kr" target="_blank" className="inline-flex items-center gap-3 px-12 py-5 bg-slate-900 text-white rounded-2xl font-black text-2xl hover:bg-black transition-all shadow-xl hover:scale-105">리로스쿨 바로가기 <Icon name="external-link" className="w-8 h-8" /></a>
                                    <br/>
                                    <button onClick={() => setStep(0)} className="text-slate-400 hover:text-indigo-600 font-black flex items-center gap-2 mx-auto transition-colors"><Icon name="refresh-cw" className="w-5 h-5" /> 처음으로 돌아가기</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Notification Toast */}
                    {copySuccess && (
                        <div className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-4 animate-fade-in z-50 border border-slate-700">
                            <div className="w-8 h-8 bg-green-500 rounded-full flex items-center justify-center shadow-lg"><Icon name="check" className="w-5 h-5 text-white" /></div>
                            <div className="text-left">
                                <p className="font-black text-lg leading-none">복사되었습니다!</p>
                                <p className="text-xs text-slate-400 mt-1 font-bold">Gemini 창에 붙여넣으세요 (Ctrl+V)</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
